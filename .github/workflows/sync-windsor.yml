name: Sync Windsor.ai Marketing Data

on:
  schedule:
    # Hourly. Adjust cron as needed.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and aggregate Windsor blended endpoint
        env:
          # Single Windsor blended URL covering all connected data sources.
          # Add it as a repository secret: Settings → Secrets and variables → Actions.
          WINDSOR_BLENDED_URL: ${{ secrets.WINDSOR_BLENDED_URL }}
        run: node scripts/sync-windsor.mjs

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain data/windsor.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/windsor.json
            git commit -m "chore(data): refresh Windsor.ai sync"
            git push
          else
            echo "No changes to commit."
          fi
